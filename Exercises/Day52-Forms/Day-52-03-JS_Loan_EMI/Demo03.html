<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearDebt Loan Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function calculateLoan() {
            var amount = parseFloat(document.getElementById("amount").value)
            var rate = parseFloat(document.getElementById("rate").value)
            var months = parseInt(document.getElementById("months").value)

            var tbody = document.getElementById("scheduleBody")
            tbody.innerHTML = ""

            if (isNaN(amount) || isNaN(rate) || isNaN(months) || amount <= 0 || rate < 0 || months <= 0) {
                alert("Please enter valid values")
                return false
            }

            var monthlyRate = rate / 12 / 100
            var emi

            if (monthlyRate == 0) {
                emi = amount / months
            } else {
                emi = amount * monthlyRate * Math.pow(1 + monthlyRate, months) / (Math.pow(1 + monthlyRate, months) - 1)
            }

            var balance = amount

            for (var i = 1; i <= months; i++) {
                var loanLeft = balance
                var interest = balance * monthlyRate
                var principal = emi - interest

                if (i == months) {
                    principal = balance
                    emi = principal + interest
                }

                balance = balance - principal

                if (balance < 0) {
                    balance = 0
                }

                var row = "<tr>"
                row += "<td>" + i + "</td>"
                row += "<td>" + loanLeft.toFixed(2) + "</td>"
                row += "<td>" + emi.toFixed(2) + "</td>"
                row += "<td>" + principal.toFixed(2) + "</td>"
                row += "<td>" + interest.toFixed(2) + "</td>"
                row += "<td>" + balance.toFixed(2) + "</td>"
                row += "</tr>"

                tbody.innerHTML += row
            }

            return false
        }
    </script>
</head>
<body class="bg-light">

    <div class="container my-5">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="text-center mb-4">ClearDebt Loan Calculator</h2>

                <form onsubmit="return calculateLoan()" class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Loan Amount</label>
                        <input type="text" id="amount" class="form-control" placeholder="Enter amount">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Interest Rate (%)</label>
                        <input type="text" id="rate" class="form-control" placeholder="Enter annual rate">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Months</label>
                        <input type="text" id="months" class="form-control" placeholder="Enter months">
                    </div>

                    <div class="col-12 text-center">
                        <input type="submit" value="Generate Schedule" class="btn btn-primary px-4">
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-striped table-bordered text-center align-middle">
                        <thead class="table-secondary">
                            <tr>
                                <th>SNO</th>
                                <th>Loan Left</th>
                                <th>EMI</th>
                                <th>Principal</th>
                                <th>Interest</th>
                                <th>Remaining</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
