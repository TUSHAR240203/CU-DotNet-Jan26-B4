<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Switch</title>

<script>

function switchOn(){
    document.getElementById("bulb").src="/Day52-04-JS_BulbOnOff/Bulb02.jpeg";
}

function switchOff(){
    document.getElementById("bulb").src="/Day52-04-JS_BulbOnOff/Bulb01.jpeg";
}

</script>

</head>

<body style="text-align:center; font-family:Arial">

<input type="button" value="Switch Off" onclick="switchOff()">
<input type="button" value="Switch On" onclick="switchOn()">

<br><br>

<img id="bulb" src="/Day52-04-JS_BulbOnOff/Bulb02.jpeg" width="200">

</body>

</html>
